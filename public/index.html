<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — 2nth.ai Developer Portal</title>
  <link rel="icon" type="image/svg+xml" href="https://2nth.ai/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-carbon:#0a0a0a; --c-graphite:#141414; --c-titanium:#fafafa;
      --c-steel-400:#c4c4cc; --c-steel-600:#71717a; --c-steel-700:#52525b;
      --c-border:hsla(0,0%,100%,.06); --c-input-bg:#141414;
    }
    .light {
      --c-carbon:#fff; --c-graphite:#f7f8fa; --c-titanium:#0a0a0a;
      --c-steel-400:#3f3f46; --c-steel-600:#71717a; --c-steel-700:#a1a1aa;
      --c-border:rgba(0,0,0,.08); --c-input-bg:#f7f8fa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--c-carbon); color: var(--c-steel-600);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .wrap { max-width: 420px; width: 100%; padding: 24px; text-align: center; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 0.06em; color: var(--c-titanium); text-decoration: none; }
    .logo span { color: #06B6D4; }
    .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--c-steel-600); margin-top: 2px; margin-bottom: 32px; }
    .card { background: var(--c-graphite); border: 1px solid var(--c-border); border-radius: 8px; padding: 36px 32px; text-align: left; }
    .label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--c-steel-600); margin-bottom: 8px; font-weight: 600; }
    .row { display: flex; gap: 8px; margin-bottom: 14px; }
    .input {
      flex: 1; padding: 12px 14px; border: 1px solid var(--c-border); border-radius: 4px;
      background: var(--c-input-bg); color: var(--c-titanium);
      font-family: 'JetBrains Mono', monospace; font-size: 14px; outline: none;
      transition: border-color 0.15s;
    }
    .input::placeholder { color: var(--c-steel-700); }
    .input:focus { border-color: #06B6D4; }
    .btn {
      padding: 12px 22px; border: 1px solid #06B6D4; border-radius: 4px;
      background: #06B6D4; color: #0a0a0a; cursor: pointer;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; white-space: nowrap;
      transition: background 0.15s;
    }
    .btn:hover { background: #0891b2; border-color: #0891b2; }
    .divider {
      display: flex; align-items: center; gap: 12px; margin: 18px 0;
      font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--c-steel-700);
    }
    .divider::before, .divider::after { content: ''; flex: 1; border-top: 1px solid var(--c-border); }
    .alt-row { display: flex; gap: 8px; }
    .alt-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px; border: 1px solid var(--c-border); border-radius: 4px;
      background: var(--c-carbon); color: var(--c-steel-400); text-decoration: none;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; transition: all 0.15s; cursor: pointer;
    }
    .alt-btn:hover { border-color: #06B6D4; color: #06B6D4; }
    .hint { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--c-steel-700); margin-top: 14px; text-align: center; }
    .msg { font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 10px 14px; border-radius: 4px; margin-bottom: 14px; display: none; }
    .msg.show { display: block; }
    .msg-err { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); color: #EF4444; }
    .features { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 28px; }
    .feat { display: flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--c-steel-600); }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: #06B6D4; }
    .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
    .links a { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--c-steel-600); text-decoration: none; transition: color 0.15s; }
    .links a:hover { color: #06B6D4; }
    .footer { margin-top: 40px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--c-steel-700); }
    .footer a { color: #06B6D4; text-decoration: none; }
  </style>
</head>
<body>
<div class="wrap">
  <a href="https://2nth.ai" class="logo"><span>2</span>NTH</a>
  <div class="subtitle">Developer &amp; Partner Portal</div>

  <div class="card">
    <div id="msg" class="msg"></div>
    <label class="label">Sign in with your email</label>
    <div class="row">
      <input type="email" id="email" class="input" placeholder="you@company.com" onkeydown="if(event.key==='Enter')document.getElementById('go').click()">
      <button type="button" id="go" class="btn" onclick="doSignIn()">Sign In</button>
    </div>
    <div class="divider">or continue with</div>
    <div class="alt-row">
      <a href="/api/auth/login" class="alt-btn">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        GitHub
      </a>
      <a href="https://2nth.ai/#start" class="alt-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Sign in on 2nth.ai
      </a>
    </div>
    <div class="hint">We'll redirect you to 2nth.ai to sign in. No password needed.</div>
  </div>

  <div class="features">
    <div class="feat"><div class="dot"></div>300+ AI Skills</div>
    <div class="feat"><div class="dot"></div>Partner Hubs</div>
    <div class="feat"><div class="dot"></div>Revenue Sharing</div>
    <div class="feat"><div class="dot"></div>Token Billing</div>
  </div>

  <div class="links">
    <a href="/docs.html">Docs</a>
    <a href="/portal.html">Portal</a>
    <a href="/partners/gridlineprop.html">GridLineProp</a>
    <a href="/partners/scanman.html">ScanMan</a>
    <a href="/partners/agilex.html">Agilex</a>
  </div>

  <div class="footer"><a href="https://2nth.ai">2nth.ai</a> — from thought to motion</div>
</div>

<script>
function doSignIn() {
  var email = document.getElementById('email').value.trim().toLowerCase();
  var msg = document.getElementById('msg');

  if (!email || email.indexOf('@') === -1) {
    msg.className = 'msg show msg-err';
    msg.textContent = 'Enter a valid email address.';
    return;
  }

  var returnTo = encodeURIComponent(window.location.origin + '/docs.html');
  window.location.href = 'https://2nth.ai/#start?email=' + encodeURIComponent(email) + '&returnTo=' + returnTo;
}
</script>
</body>
</html>
